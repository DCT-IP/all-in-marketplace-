<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

<div class="navbar">
    <div class="logo">Cart</div>
    <div class="nav-actions">
        <button onclick="window.location.href='/'">Home</button>
    </div>
</div>

<div class="cart-container">

    <h2>Your Cart</h2>

    <div id="cartItems"></div>

    <div class="cart-summary">
        <h3>Total: ₹<span id="totalPrice">0</span></h3>
        <button class="checkout-btn" onclick="checkout()">Checkout</button>
    </div>

</div>
<div class="checkout-form" id="checkoutForm" style="display: none;">
    <h3>Checkout Details</h3>

    <input id="phone" placeholder="Phone Number">
    <textarea id="address" placeholder="Address"></textarea>

<div class="checkout-section">
    <h3>Payment Method</h3>

    <div class="payment-options">

        <label class="payment-card">
            <input type="radio" name="payment" value="upi" checked>
            <div class="payment-content">
                <span class="payment-title">UPI</span>
                <span class="payment-desc">Google Pay / PhonePe / Paytm</span>
            </div>
        </label>

        <label class="payment-card">
            <input type="radio" name="payment" value="card">
            <div class="payment-content">
                <span class="payment-title">Card</span>
                <span class="payment-desc">Debit / Credit Card</span>
            </div>
        </label>

        <label class="payment-card">
            <input type="radio" name="payment" value="cod">
            <div class="payment-content">
                <span class="payment-title">Cash on Delivery</span>
                <span class="payment-desc">Pay when you receive</span>
            </div>
        </label>

    </div>
</div>

<button onclick="placeOrder()" class="checkout-btn">
    Place Order
</button>
</div>

<script defer src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
