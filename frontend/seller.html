<!DOCTYPE html>
<html>
<head>
    <title>Seller Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script defer src="{{ url_for('static', filename='seller.js') }}"></script>
</head>

<body>

<div class="navbar">
    <div class="logo">Seller Dashboard</div>

    <div class="nav-actions">
        <button onclick="goHome()">Home</button>
        <button onclick="toggleDarkMode()">🌙</button>
    </div>
</div>

<div class="dashboard-container">

    <!-- STATS -->
    <div class="stats-grid">
        <div class="stat-card">
            <h4>Total Products</h4>
            <p id="total_products">0</p>
        </div>

        <div class="stat-card">
            <h4>Total Orders</h4>
            <p id="total_orders">0</p>
        </div>

        <div class="stat-card">
            <h4>Total Revenue</h4>
            <p id="total_revenue">₹0</p>
        </div>
    </div>

    <!-- PRODUCTS -->
    <h2>Your Products</h2>
    <div id="seller_products" class="products-grid"></div>

</div>

</body>
</html>
