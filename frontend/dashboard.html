<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script defer src="{{ url_for('static', filename='script.js') }}"></script>
</head>

<body class="dashboard-body">

<div class="dashboard-container">

    <div class="dashboard-header">
        <h1>Seller Dashboard</h1>
        <p id="welcomeText"></p>
    </div>

    <div id="stats" class="stats-grid"></div>

    <div class="section">
        <h2>Your Products</h2>
        <div id="products" class="product-grid"></div>
    </div>

    <div class="dashboard-actions">
        <button onclick="window.location.href='/'">Marketplace</button>
        <button onclick="goToCart()">Cart</button>
        <button onclick="logout()">Logout</button>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    const userId = localStorage.getItem("user_id");
    const role = localStorage.getItem("role");

    if (!userId || role !== "seller") {
        window.location.href = "/";
        return;
    }

    document.getElementById("welcomeText").innerText =
        "Welcome Seller #" + userId;

    const res = await fetch(`/seller/${userId}`);
    const data = await res.json();

    const statsDiv = document.getElementById("stats");

    statsDiv.innerHTML = `
        <div class="stat-card">
            <h3>Revenue</h3>
            <p>₹${data.stats?.revenue || 0}</p>
        </div>

        <div class="stat-card">
            <h3>Orders</h3>
            <p>${data.stats?.orders || 0}</p>
        </div>

        <div class="stat-card">
            <h3>Products</h3>
            <p>${data.products?.length || 0}</p>
        </div>
    `;

    const prodDiv = document.getElementById("products");

    if (!data.products || data.products.length === 0) {
        data.products = [
            { product_name: "Sample Product 1", price: 499 },
            { product_name: "Sample Product 2", price: 999 }
        ];
    }

    prodDiv.innerHTML = "";

    data.products.forEach(p => {
        prodDiv.innerHTML += `
            <div class="product-card">
                <h4>${p.product_name || p.name}</h4>
                <p class="price">₹${p.price}</p>
            </div>
        `;
    });
});
</script>

</body>
</html>
